version: "3.9"

services:
  netemu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: netemu-rewrite
    restart: unless-stopped
    network_mode: host
    privileged: true
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    volumes:
      - ./backend/data:/opt/netemu/backend/data
      - /lib/modules:/lib/modules:ro
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
